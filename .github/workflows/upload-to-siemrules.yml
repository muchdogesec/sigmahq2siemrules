name: Upload Changed Rules to SIEMRULES

on:
  workflow_dispatch:
    inputs:
      run_staging:
        description: "Run staging upload"
        required: true
        type: boolean
        default: true
      run_production:
        description: "Run production upload"
        required: true
        type: boolean
        default: true
      start_commit:
        description: "Start commit SHA (defaults to last production commit or empty tree if not available)"
        required: false
        type: string
      end_commit:
        description: "End commit SHA (defaults to HEAD if not provided)"
        required: false
        type: string
  schedule:
    - cron: "0 0 * * *"

jobs:
  resolve-range:
    runs-on: ubuntu-latest
    outputs:
      start_commit: ${{ steps.range.outputs.start_commit }}
      end_commit: ${{ steps.range.outputs.end_commit }}
      matrix: ${{ steps.generate-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download previous production commit artifact
        if: ${{ !github.event.inputs.start_commit }}
        uses: dawidd6/action-download-artifact@v6
        with:
          name: last-production-commit-sha
          path: artifacts/
          workflow: upload-to-siemrules.yml
          workflow_conclusion: success
          if_no_artifact_found: ignore
          allow_forks: false

      - name: Generate upload matrix
        id: generate-matrix
        run: |
          python -c "
          import json, os
          from pathlib import Path
          matrix = [
          ]
          if ${{ github.event.inputs.run_staging }} == 'true' or ${{ github.event_name }} == 'schedule':
              matrix.append({
                  'target': 'staging',
                  'environment': 'siemrules-staging',
                  'upload_commit_sha': 'false',
              })
          if ${{ github.event.inputs.run_production }} == 'true' or ${{ github.event_name }} == 'schedule':
              matrix.append({
                  'target': 'production',
                  'environment': 'siemrules-production',
              })
          
          if matrix:
              matrix[-1]['upload_commit_sha'] = 'true'
              
          path = Path(os.getenv('GITHUB_OUTPUT'))
          path.write_text('matrix=' + json.dumps(matrix))
          "

      - name: Resolve commit range
        id: range
        shell: bash
        run: |
          EMPTY_TREE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          START_COMMIT="${{ github.event.inputs.start_commit }}"
          END_COMMIT="${{ github.event.inputs.end_commit }}"

          if [ -z "$START_COMMIT" ] && [ -f artifacts/last_commit.txt ]; then
            START_COMMIT="$(cat artifacts/last_commit.txt)"
          fi

          if [ -z "$START_COMMIT" ]; then
            START_COMMIT="$EMPTY_TREE_SHA"
          fi

          if [ -z "$END_COMMIT" ]; then
            END_COMMIT="$(git rev-parse HEAD)"
          fi

          echo "start_commit=$START_COMMIT" >> "$GITHUB_OUTPUT"
          echo "end_commit=$END_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Write summary
        run: |
          {
            echo "# Upload Range"
            echo
            echo "- Start commit: \`${{ steps.range.outputs.start_commit }}\`"
            echo "- End commit: \`${{ steps.range.outputs.end_commit }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  upload:
    name: Upload to ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs:
      - resolve-range
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-range.outputs.matrix) }}
    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload changed rules to ${{ matrix.target }}
        env:
          SIEMRULES_BASE_URL: ${{ secrets.SIEMRULES_BASE_URL }}
          SIEMRULES_API_KEY: ${{ secrets.SIEMRULES_API_KEY }}
          DETECTION_PACK_ID: ${{ secrets.DETECTION_PACK_ID }}
          MAX_WORKERS: "10"
          STATUS_CHECK_INTERVAL: "5"
          MAX_STATUS_CHECKS: "60"
        run: |
          python actions/uploader.py \
            --start-commit "${{ needs.resolve-range.outputs.start_commit }}" \
            --end-commit "${{ needs.resolve-range.outputs.end_commit }}"

      - name: Upload ${{ matrix.target }} artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siemrules-${{ matrix.target }}-results
          path: artifacts/
          retention-days: 7

      - name: Upload badges
        if: always() && matrix.target == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: siemrules-badges
          path: artifacts/badges.json
          retention-days: 90
          overwrite: true

      - name: Upload last production commit SHA
        if: success() && matrix.upload_commit_sha == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: last-production-commit-sha
          path: artifacts/last_commit.txt
          retention-days: 90
          overwrite: true
